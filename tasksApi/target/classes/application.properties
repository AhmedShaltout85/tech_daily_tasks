# Server Configuration
server.port=8080
server.servlet.context-path=/tasks-api

# Database Configuration
spring.datasource.url=jdbc:sqlserver://localhost:1433;databaseName=tech_daily_tasks;encrypt=false;trustServerCertificate=true
spring.datasource.username=awco
spring.datasource.password=awco
spring.datasource.driver-class-name=com.microsoft.sqlserver.jdbc.SQLServerDriver

# JPA Configuration
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.SQLServerDialect

# JWT Configuration (512-bit key required for HS512)
jwt.secret=mySecretKey123456789012345678901234567890123456789012345678901234567890
jwt.expiration.ms=86400000

# Logging
logging.level.com.ao8r.tasks_api=DEBUG
logging.level.org.springframework.security=DEBUG
logging.level.org.hibernate.SQL=DEBUG

# Timezone
spring.jpa.properties.hibernate.jdbc.time_zone=UTC
