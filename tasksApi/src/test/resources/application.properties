# Test Application Properties
# Uses H2 in-memory database for integration tests

# Server Configuration
server.port=8080

# H2 Database Configuration (for testing)
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA Configuration
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# JWT Configuration (512-bit key required for HS512)
jwt.secret=testSecretKey123456789012345678901234567890123456789012345678901234567890
jwt.expiration.ms=86400000

# Logging
logging.level.com.ao8r.tasks_api=DEBUG

# Timezone
spring.jpa.properties.hibernate.jdbc.time_zone=UTC
